<div class="modal-header">
  <h3 class="text-xl font-bold">Large Modal</h3>
  <button class="modal-close" data-modal-close>&times;</button>
</div>
<div class="modal-body">
  <p>This is a large modal for more content.</p>
  <div class="mt-4 p-4 bg-surface rounded">
    <h4 class="font-bold mb-2">Additional Content</h4>
    <p class="text-secondary">You can include more complex layouts here.</p>
  </div>
  <table class="table mt-4">
    <thead>
      <tr><th>Column 1</th><th>Column 2</th><th>Column 3</th></tr>
    </thead>
    <tbody>
      <tr><td>Data 1</td><td>Data 2</td><td>Data 3</td></tr>
      <tr><td>Data 4</td><td>Data 5</td><td>Data 6</td></tr>
    </tbody>
  </table>
</div>
<div class="modal-footer">
  <button class="btn btn-ghost" data-modal-close>Cancel</button>
  <button class="btn btn-primary">Save</button>
</div>
